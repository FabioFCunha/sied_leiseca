databases:
  - name: agenda-educacao-db
    databaseName: agenda_educacao
    user: agenda_educacao
    plan: free

services:
  - type: web
    name: agenda-educacao-api
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: python manage.py migrate && python manage.py bootstrap_admin && python manage.py sync_operational_data --sync-version 2026-06-19-1 && python manage.py sync_user_lookups && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /healthz/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: DATABASE_URL
        fromDatabase:
          name: agenda-educacao-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@agenda.local
      - key: DJANGO_SUPERUSER_PASSWORD
        value: Admin@12345
      - key: DJANGO_SUPERUSER_FULL_NAME
        value: Admin Agenda
      - key: EMAIL_BACKEND
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        sync: false
      - key: EMAIL_USE_SSL
        sync: false
      - key: EMAIL_TIMEOUT
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: AGENDA_REPLY_TO_EMAIL
        sync: false

  - type: web
    name: agenda-educacao-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://agenda-educacao-api.onrender.com/api
