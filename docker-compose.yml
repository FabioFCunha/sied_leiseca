services:
  db:
    image: postgres:16-alpine
    container_name: sied_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-agenda_educacao}
      POSTGRES_USER: ${DB_USER:-agenda_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agenda_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sied_redis
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: sied_backend
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgres://${DB_USER:-agenda_user}:${DB_PASSWORD:-agenda_pass}@db:5432/${DB_NAME:-agenda_educacao}
      - CACHE_URL=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY:-insecure_default_key_change_me}
      - DEBUG=False
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=${FRONTEND_URL:-http://localhost}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media

  frontend:
    build:
      context: ./frontend
    container_name: sied_frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=${API_URL:-/api}
      - VITE_API_TIMEOUT_MS=90000

  nginx:
    image: nginx:alpine
    container_name: sied_proxy
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro

volumes:
  postgres_data:
  static_volume:
  media_volume:
